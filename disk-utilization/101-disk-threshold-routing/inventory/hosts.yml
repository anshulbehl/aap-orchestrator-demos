---
all:
  children:
    linux:
      hosts:
        disk-demo-vm:
          ansible_host: "{{ lookup('env', 'DISK_DEMO_VM_IP') | default('CHANGEME', true) }}"
          ansible_user: ec2-user
          ansible_ssh_private_key_file: "{{ lookup('env', 'DISK_DEMO_SSH_KEY') | default('~/.ssh/ao-disk-demo-key.pem', true) }}"
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          # ec2_instance_id: optional override; auto-discovered via IMDS or AWS IP lookup
