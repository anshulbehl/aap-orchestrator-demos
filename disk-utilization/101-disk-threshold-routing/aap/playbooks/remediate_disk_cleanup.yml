---
- name: Cleanup logs — disk usage elevated
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: true
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') }}"
        disk_tier: "{{ disk_tier | default('unknown') }}"
        log_retention_days: "{{ log_retention_days | default(90) | int }}"

    - name: Find dnf cache files
      ansible.builtin.find:
        paths: /var/cache/dnf
        hidden: true
        file_type: any
      register: dnf_cache_files
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Remove dnf cache files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ dnf_cache_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Find old compressed log archives
      ansible.builtin.find:
        paths: /var/log
        patterns: "*.gz"
        age: "{{ log_retention_days }}d"
        age_stamp: mtime
        recurse: true
        file_type: file
      register: old_log_archives_gz

    - name: Find old uncompressed rotated logs
      ansible.builtin.find:
        paths: /var/log
        patterns:
          - "messages-*"
          - "secure-*"
          - "wtmp-*"
          - "btmp-*"
        age: "{{ log_retention_days }}d"
        age_stamp: mtime
        recurse: true
        file_type: file
      register: old_log_archives_plain

    - name: Combine log files to remove
      ansible.builtin.set_fact:
        old_logs_to_remove: "{{ (old_log_archives_gz.files | default([])) + (old_log_archives_plain.files | default([])) }}"

    - name: Remove old log archives
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_logs_to_remove }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Log cleanup completed
      ansible.builtin.debug:
        msg: >-
          {{ disk_mount }} was {{ disk_use_percent }}% full —
          removed {{ dnf_cache_files.files | default([]) | length }} dnf cache entries,
          {{ old_log_archives_gz.files | default([]) | length }} compressed logs,
          and {{ old_log_archives_plain.files | default([]) | length }} uncompressed rotated logs
          older than {{ log_retention_days }} days.

    - name: Publish cleanup results for downstream steps
      ansible.builtin.set_stats:
        data:
          disk_mount: "{{ disk_mount }}"
          disk_use_percent: "{{ disk_use_percent }}"
          disk_tier: "{{ disk_tier }}"
          notify_host: "{{ ansible_play_hosts | join(',') }}"
          remediation_action: Cleanup Logs
          log_retention_days: "{{ log_retention_days }}"
          dnf_cache_removed: "{{ dnf_cache_files.files | default([]) | length }}"
          log_archives_removed: "{{ old_logs_to_remove | length }}"
          log_archives_gz_removed: "{{ old_log_archives_gz.files | default([]) | length }}"
          log_archives_plain_removed: "{{ old_log_archives_plain.files | default([]) | length }}"
        per_host: false
        aggregate: false
      run_once: true
