---
- name: Cleanup logs — disk usage elevated
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: true
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') }}"

    - name: Find dnf cache files
      ansible.builtin.find:
        paths: /var/cache/dnf
        hidden: true
        file_type: any
      register: dnf_cache_files
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Remove dnf cache files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ dnf_cache_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Find old rotated log archives
      ansible.builtin.find:
        paths: /var/log
        patterns: "*.gz"
        age: 7d
        age_stamp: mtime
        recurse: true
        file_type: file
      register: old_log_archives

    - name: Remove old rotated log archives
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_log_archives.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Log cleanup completed
      ansible.builtin.debug:
        msg: >-
          {{ disk_mount }} was {{ disk_use_percent }}% full —
          removed {{ dnf_cache_files.files | default([]) | length }} dnf cache entries
          and {{ old_log_archives.files | length }} old log archives.

    - name: Publish cleanup results for downstream steps
      ansible.builtin.set_stats:
        data:
          disk_mount: "{{ disk_mount }}"
          disk_use_percent: "{{ disk_use_percent }}"
          notify_host: "{{ ansible_play_hosts | join(',') }}"
          remediation_action: Cleanup Logs
          dnf_cache_removed: "{{ dnf_cache_files.files | default([]) | length }}"
          log_archives_removed: "{{ old_log_archives.files | length }}"
        per_host: false
        aggregate: false
      run_once: true
