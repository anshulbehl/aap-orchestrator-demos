---
- name: Continue — disk usage healthy
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') }}"

    - name: Disk usage is healthy
      ansible.builtin.debug:
        msg: "{{ disk_mount }} at {{ disk_use_percent }}% — no action needed."
