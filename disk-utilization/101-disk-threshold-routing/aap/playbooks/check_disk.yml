---
- name: Check disk utilization
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_warn_threshold: "{{ disk_warn_threshold | default(80) }}"
        disk_critical_threshold: "{{ disk_critical_threshold | default(95) }}"

    - name: Get disk use percent for mount
      ansible.builtin.shell: |
        set -euo pipefail
        df -P "{{ disk_mount }}" | awk 'NR==2 {gsub(/%/,"",$5); print $5}'
      args:
        executable: /bin/bash
      register: disk_use_raw
      changed_when: false

    - name: Bucket disk use into switch tier
      ansible.builtin.set_fact:
        disk_tier: >-
          {%- set pct = disk_use_raw.stdout | int -%}
          {%- if pct < (disk_warn_threshold | int) -%}
          ok
          {%- elif pct <= (disk_critical_threshold | int) -%}
          warn
          {%- else -%}
          critical
          {%- endif -%}
        disk_use_percent: "{{ disk_use_raw.stdout | int }}"

    - name: Publish disk_tier for AO switch
      ansible.builtin.set_stats:
        data:
          disk_tier: "{{ disk_tier }}"
          disk_use_percent: "{{ disk_use_percent }}"
        aggregate: false

    - name: Show detected disk tier
      ansible.builtin.debug:
        msg: "{{ disk_mount }} is {{ disk_use_percent }}% full → disk_tier={{ disk_tier }}"
