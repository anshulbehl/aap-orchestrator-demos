---
- name: Escalate — disk critically full
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') }}"

    - name: Disk critically full — escalate
      ansible.builtin.debug:
        msg: >-
          ALERT: {{ disk_mount }} is {{ disk_use_percent }}% full.
          Extend volume or page admin.
