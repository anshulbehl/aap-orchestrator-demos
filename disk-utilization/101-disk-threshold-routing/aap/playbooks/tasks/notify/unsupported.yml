---
- name: Build Mattermost attachment (unsupported tier)
  ansible.builtin.set_fact:
    mattermost_attachments:
      - text: "Disk utilization workflow update for {{ notify_host }} — unsupported disk_tier value."
        color: '#37a3a3'
        title: Disk Utilization Alert
        fields:
          - title: Target Host
            value: "{{ notify_host }}"
            short: true
          - title: Disk Mount
            value: "{{ disk_mount }}"
            short: true
          - title: Disk Use Percent
            value: "{{ disk_use_percent }}"
            short: true
          - title: Disk Tier
            value: "{{ disk_tier }}"
            short: true
          - title: Remediation Action
            value: "{{ remediation_action }}"
            short: true
          - title: DNF Cache Removed
            value: "{{ dnf_cache_removed }}"
            short: true
          - title: Log Archives Removed
            value: "{{ log_archives_removed }}"
            short: true
