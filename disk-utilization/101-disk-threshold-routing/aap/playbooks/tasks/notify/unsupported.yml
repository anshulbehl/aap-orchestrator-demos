---
- name: Build Mattermost attachment (unsupported tier)
  ansible.builtin.set_fact:
    mattermost_attachments:
      - text: >-
          Disk utilization workflow hit an unexpected disk_tier.
          Expected ok, warn, or critical.
        color: '#e74c3c'
        title: Unsupported Disk Tier
        fields:
          - title: Disk Tier
            value: "{{ disk_tier }}"
            short: true
