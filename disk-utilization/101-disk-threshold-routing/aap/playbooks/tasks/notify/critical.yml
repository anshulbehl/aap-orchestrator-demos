---
- name: Build Mattermost attachment (critical — volume expanded)
  ansible.builtin.set_fact:
    mattermost_attachments:
      - text: "Disk critically full on {{ notify_host }} — EBS volume expanded and filesystem grown."
        color: '#e74c3c'
        title: Disk Utilization Critical
        fields:
          - title: Target Host
            value: "{{ notify_host }}"
            short: true
          - title: Disk Mount
            value: "{{ disk_mount }}"
            short: true
          - title: Disk Use Percent
            value: "{{ disk_use_percent }}"
            short: true
          - title: Disk Tier
            value: "{{ disk_tier }}"
            short: true
          - title: Remediation Action
            value: "{{ remediation_action }}"
            short: true
          - title: EBS Expand (GiB)
            value: "{{ disk_expand_gb }}"
            short: true
          - title: Volume Before (GiB)
            value: "{{ volume_size_before_gb }}"
            short: true
          - title: Volume After (GiB)
            value: "{{ volume_size_after_gb }}"
            short: true
