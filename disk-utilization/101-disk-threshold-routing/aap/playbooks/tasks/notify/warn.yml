---
- name: Build Mattermost attachment (warning — cleanup)
  ansible.builtin.set_fact:
    mattermost_attachments:
      - text: >-
          {{ notify_host }}: cleaned up {{ disk_mount }}
          ({{ disk_use_percent_before }}% → {{ disk_use_percent_after }}%).
        color: '#f39c12'
        title: Warning — Disk Cleanup
        fields:
          - title: Space Freed
            value: "{{ space_freed_mb }} MB"
            short: true
          - title: DNF Cache
            value: "{{ dnf_cache_removed }} files ({{ dnf_cache_freed_mb }} MB)"
            short: true
          - title: Log Archives
            value: >-
              {{ log_archives_removed }} files ({{ logs_freed_mb }} MB,
              older than {{ log_retention_days }} days)
            short: false
