---
- name: Notify Mattermost chatroom — disk utilization workflow
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        notify_host: "{{ notify_host | default('unknown') | string }}"
        disk_mount: "{{ disk_mount | default('unknown') | string }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') | string }}"
        disk_tier: "{{ disk_tier | default('unknown') | string }}"
        remediation_action: "{{ remediation_action | default('unknown') | string }}"
        dnf_cache_removed: "{{ dnf_cache_removed | default('unknown') | string }}"
        log_archives_removed: "{{ log_archives_removed | default('unknown') | string }}"
        disk_use_percent_before: "{{ disk_use_percent_before | default(disk_use_percent | default('unknown')) | string }}"
        disk_use_percent_after: "{{ disk_use_percent_after | default('unknown') | string }}"
        space_freed_mb: "{{ space_freed_mb | default('unknown') | string }}"
        dnf_cache_freed_mb: "{{ dnf_cache_freed_mb | default('unknown') | string }}"
        logs_freed_mb: "{{ logs_freed_mb | default('unknown') | string }}"
        log_retention_days: "{{ log_retention_days | default('90') | string }}"
        disk_expand_gb: "{{ disk_expand_gb | default('unknown') | string }}"
        volume_size_before_gb: "{{ volume_size_before_gb | default('unknown') | string }}"
        volume_size_after_gb: "{{ volume_size_after_gb | default('unknown') | string }}"

    - name: Include tier-specific notification template
      ansible.builtin.include_tasks: "{{ item }}"
      with_first_found:
        - files:
            - "{{ playbook_dir }}/tasks/notify/{{ disk_tier }}.yml"
          skip: true
        - files:
            - "{{ playbook_dir }}/tasks/notify/unsupported.yml"

    - name: Send notification message via Mattermost
      community.general.mattermost:
        url: http://{{ mattermost_server | default('44.209.231.244:8065') }}
        api_key: "{{ api_chat_token }}"
        attachments: "{{ mattermost_attachments }}"
      delegate_to: localhost
