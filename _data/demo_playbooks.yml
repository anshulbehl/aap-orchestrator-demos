cert-rotation-101:
  status: active
  items:
    - name: renew_certificate.yml
      path: cert-rotation/101-cert-lifecycle/aap/playbooks/renew_certificate.yml
      description: Pulls a new PEM certificate from Vault CA, installs it for nginx, and reloads the service.
      runs_on: RHEL node (nginx / PEM)
    - name: renew_keystore_certificate.yml
      path: cert-rotation/101-cert-lifecycle/aap/playbooks/renew_keystore_certificate.yml
      description: Renews a Java keystore certificate for the API server, updating the keystore and restarting the application.
      runs_on: RHEL node (Java keystore)
    - name: validate_certificate.yml
      path: cert-rotation/101-cert-lifecycle/aap/playbooks/validate_certificate.yml
      description: Runs an OpenSSL TLS handshake check and reports certificate subject, issuer, and expiry after renewal.
      runs_on: RHEL node
    - name: notify_mattermost.yml
      path: cert-rotation/101-cert-lifecycle/aap/playbooks/notify_mattermost.yml
      description: Posts renewal status, agent confidence, and analysis summary to Mattermost after the workflow completes.
      runs_on: localhost (Mattermost API)

