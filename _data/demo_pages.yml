sean-test:
  description: Sandbox copy of disk utilization for testing custom Mermaid diagram assets. The workflow diagram uses an AAP job template PNG on the check node instead of a plain text box — all playbooks and AO JSON are identical to the disk utilization 101 demo.
  why_it_matters:
    - Uses the same disk workflow as production 101 — this page validates custom AO UI icons inside Mermaid without changing playbooks or workflow logic.
    - PNG node cards make workflow diagrams recognizable to operators who live in the automation orchestrator canvas.
    - Proves the marketplace can mirror real AO visuals while staying maintainable on GitHub Pages.

disk-utilization-101:
  description: Servers run out of disk space at different urgency levels. At 72% you do nothing. At 85% you reclaim cache and old logs before it hurts. At 97% you add capacity — on EC2, expand the EBS volume, grow the partition, and extend XFS. Each path posts a tier-specific Mattermost message so the team knows what ran.
  why_it_matters:
    - One check playbook and one switch replace a nest of conditional jobs — disk tier drives the right response automatically.
    - Remediation scales with severity — log and exit at low usage, cleanup at warning, expand capacity at critical instead of one-size-fits-all scripting.
    - Tier-specific Mattermost notifications tell operators exactly what ran, so on-call does not have to dig through job logs.

cert-rotation-101:
  description: Two certificates expire on production services at the same time. Splunk fires alerts to automation orchestrator. An AI agent analyzes each certificate, discovers available AAP job templates, and selects the correct renewal strategy — PEM for nginx, Java keystore for the API server — without hardcoded routing. An operator reviews the agent's analysis and confidence score, approves, and AAP renews and validates TLS automatically.
  why_it_matters:
    - One workflow intelligently handles multiple certificate types instead of maintaining separate automation for each.
    - AI provides deployment recommendations and confidence before changes are made, reducing operational risk.
    - Validation and notification are built into the process, giving operators confidence that renewal actually succeeded.

cert-rotation-201:
  description: This demo extends Intelligent Cert Lifecycle 101 with AI-assessed risk scoring per certificate. A switch routes low, medium, and high risk renewals to different approval and execution paths.
  why_it_matters:
    - Risk scoring separates low-touch auto-renewals from high-risk changes that need human approval.
    - One switch node routes by AI-assessed tier instead of brittle per-host workflow forks.
    - Blast radius analysis gives approvers context before they sign off on production cert changes.
  bullets:
    - Risk scoring per certificate (low/medium/high)
    - Switch-node routing to different approval flows per risk level
    - Blast radius analysis
    - Multiple hosts with different cert types
  routes:
    headers: [Risk tier, Action]
    rows:
      - [Low, Auto-renew]
      - [Medium, Notify + renew]
      - [High, Approval required]

cert-rotation-301:
  description: Scheduled proactive scans inventory the full certificate estate and renew or escalate before expiry becomes an incident. Extends the risk-based 201 pattern with estate-wide coverage and compliance reporting.
  why_it_matters:
    - Proactive scans catch expiring certificates before monitoring fires at 2 a.m.
    - Estate-wide inventory avoids the surprise of a forgotten cert on a non-production host.
    - Compliance reporting closes the loop for auditors who need proof of lifecycle management.
  bullets:
    - Scheduled scanning of the full certificate estate
    - AI classification across all discovered certs
    - Auto-remediation for low-risk certs
    - Escalation for critical certs
    - Compliance reporting
  routes:
    headers: [Condition, Action]
    rows:
      - [Expires within window, Renew proactively]
      - [No expiry risk, Log OK — no action]

cert-rotation-102:
  description: Rule-based certificate expiry handling — distinct from Intelligent Cert Lifecycle 101 which uses an AI agent to pick renewal templates. This demo switches on cert_status from days remaining with no LLM required.
  why_it_matters:
    - Days-remaining tiers match how operations teams actually plan cert work — healthy, plan, renew, emergency.
    - No AI dependency — deterministic switch routing anyone can audit and reproduce.
    - Clear escalation from skip to emergency renew without custom Controller decision trees.
  one_liner: Expiry isn't pass/fail — it's a countdown.
  routes:
    headers: [cert_status, Days remaining, Action]
    rows:
      - [healthy, "> 60", "Skip — no action"]
      - [plan, "30–60", Open change request]
      - [renew, "7–30", Run renewal playbook]
      - [emergency, "< 7", "Renew + alert + verify chain"]
  related_table:
    heading: Relationship to other cert demos
    headers: [Demo, Approach]
    rows:
      - ["101 Intelligent Cert Lifecycle", "AI agent selects PEM vs keystore renewal (active)"]
      - ["102 Expiry Threshold Routing", "Rule-based switch on days remaining"]
      - ["201 Risk-Based Routing", "AI-assessed risk tier"]
      - ["301 Proactive Assessment", Scheduled estate-wide scan]

service-health-101:
  description: One host, one service (httpd). Run a check playbook that publishes service_state. Route remediation in a single switch — no nested Controller decision trees.
  why_it_matters:
    - service_state maps directly to the right fix — start, restart, or install — not generic success/failure guessing.
    - One switch replaces nested Controller forks that obscure what failed and why.
    - Demo-friendly with httpd — stop, fail, or remove the package and watch the workflow pick the correct path.
  routes:
    headers: [service_state, Path, Planned action]
    rows:
      - [active, "Green — done", "Log OK, no changes"]
      - [inactive, "Yellow — start it", Start the service]
      - [failed, "Orange — recover", Inspect logs and restart]
      - [not-found, "Red — install", Install the package and enable the unit]
  demo_ideas:
    - Stop httpd → workflow routes to inactive → start path
    - "dnf remove httpd → workflow routes to not-found → install path"

patch-management-101:
  description: Run a patch assessment playbook that publishes highest_severity from dnf updateinfo or an Insights scan. Switch on the value and route to the response that matches your change policy.
  why_it_matters:
    - Patch severity from a single assessment drives the change policy — critical now, important scheduled, moderate batched.
    - Aligns automation with how change advisory boards actually approve work.
    - Avoids patching everything urgently or nothing at all when scan results land.
  one_liner: One scan job. Four remediation strategies.
  routes:
    headers: [highest_severity, Action]
    rows:
      - [critical, "Patch now + open maintenance window"]
      - [important, Schedule change window]
      - [moderate, Add to weekly batch]
      - [none, "Report compliant, exit"]

user-lifecycle-101:
  description: Switch on request_type from an automation orchestrator survey, webhook, or ticket integration. Each value triggers a purpose-built automation path.
  why_it_matters:
    - One intake form routes to four completely different runbooks — no duplicate workflows per request type.
    - Survey, webhook, or ticket integrations all publish the same request_type artifact.
    - Human-initiated automation gets the same switch pattern as infrastructure metrics.
  one_liner: One form. Four completely different runbooks.
  routes:
    headers: [request_type, Action]
    rows:
      - [new_hire, "Create user, SSH key, sudo, groups"]
      - [contractor, "Create user, expiry date, limited sudo"]
      - [role_change, Update groups and sudo only]
      - [termination, "Lock account, archive home, revoke keys"]

backup-management-101:
  description: Backup jobs often return outcomes that binary workflows mishandle. Switch on backup_result — partial success is neither pass nor fail.
  why_it_matters:
    - Partial backup success gets its own path — neither celebrated as success nor treated as total failure.
    - Operators get retry, escalate, or log actions matched to backup_result, not binary job status.
    - Reduces false all-clear pages when only half the targets backed up.
  routes:
    headers: [backup_result, Action]
    rows:
      - [success, Verify restore point, log OK]
      - [partial, Retry failed targets, notify ops]
      - [failed, Escalate, open incident]
      - [skipped, Log reason, check schedule]

subscription-management-101:
  description: Switch on RHEL subscription state after a compliance check. Registration status drives the remediation path — not whether the Ansible job turned green.
  why_it_matters:
    - RHEL subscription state — expiring, expired, unregistered — needs different fixes than a green Ansible job result.
    - Compliance scans that publish subscription_status enable proactive renewal before entitlement lapses.
    - Registration automation on unregistered hosts closes drift without manual inventory hunts.
  routes:
    headers: [subscription_status, Action]
    rows:
      - [registered, Log compliant]
      - [expiring, Notify + schedule renewal]
      - [expired, Register or attach subscription]
      - [unregistered, Register with activation key]

kernel-compliance-101:
  description: Kernel compliance scans produce states that need different operational responses. Reboot required is not the same as drift or end-of-life.
  why_it_matters:
    - Kernel drift, pending reboot, and EOL are different operational problems requiring different responses.
    - One scan artifact drives schedule-reboot vs patch vs migration planning without separate workflows.
    - Keeps security and stability teams aligned on what the host actually needs.
  routes:
    headers: [kernel_compliance, Action]
    rows:
      - [compliant, Log OK]
      - [reboot_required, Schedule maintenance reboot]
      - [drift, Apply kernel update playbook]
      - [eol, Flag for migration planning]

incident-remediation-201:
  description: When an incident alert fires, an AI agent analyzes context, selects a remediation strategy, and routes to the appropriate AAP playbook — without hardcoded if-statements in the workflow.
  why_it_matters:
    - AI triage picks the remediation playbook from alert context instead of hardcoded if-this-then-that graphs.
    - Dynamic template selection adapts when new playbooks ship without redesigning the workflow.
    - Validation and notification built in so operators confirm recovery, not just job completion.
  bullets:
    - AI agent triages incident payload
    - Dynamic playbook selection at runtime
    - Post-remediation validation and operator notification

incident-remediation-301:
  description: Multiple correlated alerts arrive across services. The workflow correlates them, identifies root cause when possible, and routes to targeted remediation or AI-assisted triage when not.
  why_it_matters:
    - Correlated alerts across services surface root cause before running the wrong fix on a symptom.
    - Targeted remediation when cause is known; AI fallback when it is not — one workflow, two strategies.
    - Reduces alert storms that trigger duplicate remediation on every firing host.
  bullets:
    - Multi-alert correlation across services
    - Root-cause-first remediation when identified
    - Fallback to AI triage agent
    - Validation and operator notification
