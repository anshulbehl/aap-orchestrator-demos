---
- name: Escalate — disk critically full
  hosts: "{{ _host | default('all') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Apply defaults
      ansible.builtin.set_fact:
        disk_mount: "{{ disk_mount | default('/') }}"
        disk_use_percent: "{{ disk_use_percent | default('unknown') }}"
        disk_tier: "{{ disk_tier | default('unknown') }}"

    - name: Disk critically full — escalate
      ansible.builtin.debug:
        msg: >-
          ALERT: {{ disk_mount }} is {{ disk_use_percent }}% full.
          Extend volume or page admin.

    - name: Publish remediation results for downstream steps
      ansible.builtin.set_stats:
        data:
          disk_mount: "{{ disk_mount }}"
          disk_use_percent: "{{ disk_use_percent }}"
          disk_tier: "{{ disk_tier }}"
          notify_host: "{{ ansible_play_hosts | join(',') }}"
          remediation_action: Extend Volume or Page Admin
        per_host: false
        aggregate: false
      run_once: true
