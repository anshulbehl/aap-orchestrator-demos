---
# Canonical notify artifact bundle for AO downstream notify node.
# Every remediate branch includes this task and passes branch-specific overrides.
- name: Apply notify artifact defaults
  ansible.builtin.set_fact:
    _notify_artifacts:
      notify_host: "{{ notify_host | default(ansible_play_hosts | join(',')) | string }}"
      disk_mount: "{{ disk_mount | default('/') | string }}"
      disk_use_percent: "{{ disk_use_percent | default('unknown') | string }}"
      disk_tier: "{{ disk_tier | default('unknown') | string }}"
      remediation_action: "{{ remediation_action | default('unknown') | string }}"
      disk_use_percent_before: "{{ disk_use_percent_before | default('unknown') | string }}"
      disk_use_percent_after: "{{ disk_use_percent_after | default('unknown') | string }}"
      total_reclaimed_mb: "{{ total_reclaimed_mb | default('unknown') | string }}"
      dnf_cache_removed: "{{ dnf_cache_removed | default('0') | string }}"
      dnf_cache_freed_mb: "{{ dnf_cache_freed_mb | default('unknown') | string }}"
      log_archives_removed: "{{ log_archives_removed | default('0') | string }}"
      logs_freed_mb: "{{ logs_freed_mb | default('unknown') | string }}"
      log_retention_days: "{{ log_retention_days | default('90') | string }}"
      dry_run: "{{ dry_run | default(false) | bool }}"
      disk_expand_gb: "{{ disk_expand_gb | default('unknown') | string }}"
      volume_size_before_gb: "{{ volume_size_before_gb | default('unknown') | string }}"
      volume_size_after_gb: "{{ volume_size_after_gb | default('unknown') | string }}"

- name: Publish notify artifacts for downstream steps
  ansible.builtin.set_stats:
    data: "{{ _notify_artifacts }}"
    per_host: false
    aggregate: false
  run_once: true
