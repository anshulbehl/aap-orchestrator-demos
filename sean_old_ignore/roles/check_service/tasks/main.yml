---
- name: Gather service state for orchestrator switch
  ansible.builtin.shell: |
    set -euo pipefail
    if ! systemctl cat "{{ service_name }}" &>/dev/null; then
      echo not-found
    elif systemctl is-failed --quiet "{{ service_name }}"; then
      echo failed
    elif systemctl is-active --quiet "{{ service_name }}"; then
      echo active
    else
      echo inactive
    fi
  args:
    executable: /bin/bash
  register: check_service_state
  changed_when: false

- name: Publish service_state for workflow switch
  ansible.builtin.set_stats:
    data:
      service_state: "{{ check_service_state.stdout | trim }}"
    aggregate: false

- name: Show detected service state
  ansible.builtin.debug:
    msg: "Service {{ service_name }} is {{ check_service_state.stdout | trim }}"
