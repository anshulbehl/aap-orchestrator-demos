---
all:
  children:
    webservers:
      hosts:
        cert-demo-vm:
          ansible_host: "{{ lookup('env', 'CERT_DEMO_VM_IP') | default('CHANGEME', true) }}"
          ansible_user: ec2-user
          ansible_ssh_private_key_file: "{{ lookup('env', 'CERT_DEMO_SSH_KEY') | default('~/.ssh/ao-cert-demo-key.pem', true) }}"
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
