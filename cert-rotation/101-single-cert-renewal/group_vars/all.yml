---
# Vault Configuration
vault_container_name: vault
vault_container_image: docker.io/hashicorp/vault:1.17
vault_port: 8200
vault_addr: "http://127.0.0.1:{{ vault_port }}"
vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default('demo-root-token', true) }}"
vault_secret_path: "ansible/data/certificate"

# Vault AppRole auth (for AAP credential)
vault_auth_method: approle
vault_role_id: ""
vault_secret_id: ""

# Nginx Configuration
nginx_cert_dir: /etc/nginx/ssl
nginx_conf_dir: /etc/nginx/conf.d

# Certificate Parameters
cert_cn: "{{ inventory_hostname }}"
cert_valid_days: 90
cert_key_size: 2048

# Expired cert settings (for demo setup)
cert_expired_start: "-37d"
cert_expired_end: "-7d"

# AAP Configuration
aap_host: "{{ lookup('env', 'AAP_HOST') | default('https://aap.example.com', true) }}"
aap_username: "{{ lookup('env', 'AAP_USERNAME') | default('admin', true) }}"
aap_password: "{{ lookup('env', 'AAP_PASSWORD') | default('CHANGEME', true) }}"
aap_validate_certs: true
