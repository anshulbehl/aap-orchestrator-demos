---
- name: Validate TLS certificate after renewal
  hosts: "{{ _host | default('webservers') }}"
  become: true
  gather_facts: true
  tasks:
    - name: TLS handshake check
      ansible.builtin.shell: |
        echo | openssl s_client -connect 127.0.0.1:443 -servername {{ cert_domain }} 2>/dev/null
      register: tls_handshake
      changed_when: false
      failed_when: "'Verify return code: 0' not in tls_handshake.stdout and 'Verify return code: 18' not in tls_handshake.stdout and 'Verify return code: 19' not in tls_handshake.stdout and 'Verify return code: 21' not in tls_handshake.stdout"

    - name: Get certificate details
      ansible.builtin.shell: |
        echo | openssl s_client -connect 127.0.0.1:443 -servername {{ cert_domain }} 2>/dev/null | openssl x509 -noout -subject -issuer -dates -serial
      register: cert_details
      changed_when: false

    - name: Get certificate expiry date
      ansible.builtin.shell: |
        echo | openssl s_client -connect 127.0.0.1:443 -servername {{ cert_domain }} 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2
      register: expiry_raw
      changed_when: false

    - name: Calculate days remaining
      ansible.builtin.shell: |
        expiry_epoch=$(date -d "{{ expiry_raw.stdout }}" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "{{ expiry_raw.stdout }}" +%s 2>/dev/null)
        now_epoch=$(date +%s)
        echo $(( (expiry_epoch - now_epoch) / 86400 ))
      register: days_remaining
      changed_when: false

    - name: Check nginx is responding with HTTP 200
      ansible.builtin.uri:
        url: "https://127.0.0.1"
        validate_certs: false
        status_code: 200
      register: http_check

    - name: Determine validation result
      ansible.builtin.set_fact:
        validation_passed: "{{ (days_remaining.stdout | int) > 0 and http_check.status == 200 }}"

    - name: Set validation artifacts for AO/AAP
      ansible.builtin.set_stats:
        data:
          validation_passed: "{{ validation_passed }}"
          new_expiry_date: "{{ expiry_raw.stdout }}"
          days_remaining: "{{ days_remaining.stdout }}"
          cert_details: "{{ cert_details.stdout }}"
          http_status: "{{ http_check.status }}"

    - name: Display validation result
      ansible.builtin.debug:
        msg:
          - "Validation: {{ 'PASSED' if validation_passed else 'FAILED' }}"
          - "Days remaining: {{ days_remaining.stdout }}"
          - "HTTP status: {{ http_check.status }}"
          - ""
          - "{{ cert_details.stdout }}"
