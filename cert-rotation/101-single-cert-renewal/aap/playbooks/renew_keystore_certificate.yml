---
- name: Renew Java Keystore TLS certificate from Vault CA
  hosts: "{{ _host | default('webservers') }}"
  become: true
  gather_facts: true

  vars:
    keystore_path: "{{ cert_keystore_path | default('/opt/tomcat/conf/keystore.jks') }}"
    keystore_password: "{{ cert_keystore_password | default('changeit') }}"
    keystore_alias: "{{ cert_keystore_alias | default('tomcat') }}"
    api_server_port: "{{ cert_port | default('8443') }}"
    tmp_prefix: "/tmp/renew-ks-{{ ansible_date_time.epoch }}"

  tasks:
    - name: Pull CA certificate from Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ vault_secret_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
      register: vault_secrets

    - name: Write CA certificate to temp file
      ansible.builtin.copy:
        content: "{{ vault_secrets.json.data.data.ca_cert | b64decode }}"
        dest: {{ tmp_prefix }}-ca.pem
        mode: '0600'

    - name: Write CA private key to temp file
      ansible.builtin.copy:
        content: "{{ vault_secrets.json.data.data.ca_privatekey | b64decode }}"
        dest: {{ tmp_prefix }}-ca.key
        mode: '0600'

    - name: Backup current keystore
      ansible.builtin.copy:
        src: "{{ keystore_path }}"
        dest: "{{ keystore_path }}.backup"
        remote_src: true
        mode: '0644'
      ignore_errors: true

    - name: Backup current API server cert and key
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: true
        mode: '0600'
      loop:
        - { src: /tmp/api-server.crt, dest: /tmp/api-server.crt.backup }
        - { src: /tmp/api-server.key, dest: /tmp/api-server.key.backup }
      ignore_errors: true

    - name: Generate new private key
      community.crypto.openssl_privatekey:
        path: {{ tmp_prefix }}.key
        size: "{{ cert_key_size }}"
        type: RSA
        mode: '0600'
        force: true

    - name: Generate CSR
      community.crypto.openssl_csr:
        path: {{ tmp_prefix }}.csr
        privatekey_path: {{ tmp_prefix }}.key
        common_name: "{{ cert_domain }}"
        subject_alt_name:
          - "DNS:{{ cert_domain }}"
        key_usage:
          - digitalSignature
          - keyEncipherment
        extended_key_usage:
          - serverAuth
        force: true

    - name: Sign certificate with CA
      community.crypto.x509_certificate:
        path: {{ tmp_prefix }}.crt
        privatekey_path: {{ tmp_prefix }}.key
        csr_path: {{ tmp_prefix }}.csr
        provider: ownca
        ownca_path: {{ tmp_prefix }}-ca.pem
        ownca_privatekey_path: {{ tmp_prefix }}-ca.key
        ownca_not_after: "+{{ cert_valid_days }}d"
        force: true

    - name: Create PKCS12 bundle
      ansible.builtin.command:
        cmd: >
          openssl pkcs12 -export
          -in {{ tmp_prefix }}.crt
          -inkey {{ tmp_prefix }}.key
          -certfile {{ tmp_prefix }}-ca.pem
          -out {{ tmp_prefix }}.p12
          -name {{ keystore_alias }}
          -passout pass:{{ keystore_password }}

    - name: Remove old alias from keystore
      ansible.builtin.command:
        cmd: >
          keytool -delete
          -keystore {{ keystore_path }}
          -storepass {{ keystore_password }}
          -alias {{ keystore_alias }}
      ignore_errors: true

    - name: Import new PKCS12 into Java keystore
      ansible.builtin.command:
        cmd: >
          keytool -importkeystore
          -srckeystore {{ tmp_prefix }}.p12
          -srcstoretype PKCS12
          -srcstorepass {{ keystore_password }}
          -destkeystore {{ keystore_path }}
          -deststorepass {{ keystore_password }}
          -noprompt

    - name: Deploy renewed PEM cert and key for API server
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: true
        mode: '0600'
      loop:
        - { src: {{ tmp_prefix }}.crt, dest: /tmp/api-server.crt }
        - { src: {{ tmp_prefix }}.key, dest: /tmp/api-server.key }

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - {{ tmp_prefix }}-ca.pem
        - {{ tmp_prefix }}-ca.key
        - {{ tmp_prefix }}.csr
        - {{ tmp_prefix }}.crt
        - {{ tmp_prefix }}.key
        - {{ tmp_prefix }}.p12

    - name: Restart API server to pick up new certificate
      ansible.builtin.systemd:
        name: api-server
        state: restarted

    - name: Wait for API server to be ready
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ api_server_port }}/health"
        validate_certs: false
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 12
      delay: 5

    - name: Get new certificate info
      ansible.builtin.shell: |
        echo | openssl s_client -connect 127.0.0.1:{{ api_server_port }} 2>/dev/null | openssl x509 -noout -dates -subject
      register: new_cert_info
      changed_when: false

    - name: Set renewal artifacts for AO/AAP
      ansible.builtin.set_stats:
        data:
          cert_renewal:
            status: "success"
            hostname: "{{ cert_domain }}"
            service: "api-server"
            port: "{{ api_server_port }}"
            cert_type: "java_keystore"
            valid_days: "{{ cert_valid_days }}"
            cert_info: "{{ new_cert_info.stdout }}"
